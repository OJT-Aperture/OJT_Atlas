name: Overwrite with Vercel Admin Dashboard Boilerplate

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run without pushing changes"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]

permissions:
  contents: write

jobs:
  overwrite:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create backup branch
        run: |
          BACKUP_BRANCH="backup/before-admin-dashboard-overwrite-${{ github.run_id }}"
          git branch "$BACKUP_BRANCH"
          git push origin "$BACKUP_BRANCH"

      - name: Clone boilerplate
        run: |
          git clone --depth 1 https://github.com/vercel/nextjs-postgres-nextauth-tailwindcss-template.git /tmp/boilerplate
          rm -rf /tmp/boilerplate/.git

      - name: Protect standard files
        run: |
          mkdir -p /tmp/protected

          for file in \
            ".git" \
            ".github/workflows/overwrite-boilerplate.yml" \
            ".env" \
            ".env.local" \
            ".env.production" \
            ".env.development" \
            "README.md"
          do
            if [ -e "$file" ]; then
              mkdir -p "/tmp/protected/$(dirname "$file")"
              cp -a "$file" "/tmp/protected/$file"
            fi
          done

      - name: Delete old boilerplate files
        run: |
          find . -mindepth 1 \
            ! -path "./.git" \
            ! -path "./.git/*" \
            ! -path "./.github" \
            ! -path "./.github/workflows" \
            ! -path "./.github/workflows/overwrite-boilerplate.yml" \
            ! -name ".env" \
            ! -name ".env.local" \
            ! -name ".env.production" \
            ! -name ".env.development" \
            ! -name "README.md" \
            -exec rm -rf {} +

      - name: Copy new boilerplate
        run: |
          rsync -a --delete \
            --exclude ".git" \
            --exclude ".github/workflows/overwrite-boilerplate.yml" \
            --exclude ".env" \
            --exclude ".env.local" \
            --exclude ".env.production" \
            --exclude ".env.development" \
            --exclude "README.md" \
            /tmp/boilerplate/ ./

      - name: Restore protected files
        run: |
          if [ -d /tmp/protected ]; then
            cp -a /tmp/protected/. ./
          fi

      - name: Install dependencies
        run: npm install

      - name: Run tests if available
        run: npm test --if-present

      - name: Build
        run: npm run build

      - name: Show changed files
        run: git status --short

      - name: Fail if protected files changed
        run: |
          PROTECTED_CHANGED=$(git diff --name-only -- \
            .env \
            .env.local \
            .env.production \
            .env.development \
            README.md \
            .github/workflows/overwrite-boilerplate.yml || true)

          if [ -n "$PROTECTED_CHANGED" ]; then
            echo "Protected files changed:"
            echo "$PROTECTED_CHANGED"
            exit 1
          fi

      - name: Commit and push
        if: ${{ inputs.dry_run == 'false' }}
        run: |
          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Admin dashboard overwrite boilerplate from initial commit"
          git push origin main

      - name: Dry run notice
        if: ${{ inputs.dry_run == 'true' }}
        run: |
          echo "Dry run complete. No commit or push was made."
